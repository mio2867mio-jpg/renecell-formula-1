<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RENE CELL 保養配置圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --brown:#4f3b31; --brown2:#6d574a; --ink:#2f2926; --muted:#8a7b70;
  --cream:#f7f2ea; --paper:#fffdfa; --gold:#c7a866; --line:#eadfcc;
  --am:#d9eef3; --amHead:#bcdce4; --pm:#5a463d; --pmBody:#eee9e2;
  --shadow:0 18px 55px rgba(65,45,31,.08);
}
body { font-family: 'Noto Sans TC', sans-serif; background: #fdfdfd; padding: 20px; text-align: center; }
.btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
button { padding: 14px 24px; cursor: pointer; border-radius: 8px; border: none; background: var(--brown); color: white; font-weight: 600; font-size: 16px; transition: 0.3s; }
button:hover { opacity: 0.9; }
button:disabled { background: #ccc; cursor: not-allowed; }
#captureArea { background: var(--paper); padding: 20px; display: inline-block; }
</style>
</head>
<body>

<div id="captureArea">
  <h1>RENE CELL 保養配置</h1>
  <!-- 您的保養配置內容維持不變 -->
</div>

<div class="btn-group">
  <button id="downloadBtn" onclick="handleAction('download')">下載圖片</button>
  <button id="shareBtn" onclick="handleAction('share')">傳送圖片</button>
</div>

<script>
// 統一的檔案名稱生成
function fileBaseName() { return 'RENE_CELL_保養配置_' + new Date().getTime(); }

// 產生圖片核心邏輯：統一放大 2 倍確保高解析度，並採用 JPEG 優化
async function makeCanvas(scale = 2) {
  const el = document.getElementById('captureArea');
  return await html2canvas(el, { scale: scale, useCORS: true, backgroundColor: null });
}

// 統一操作入口
async function handleAction(type) {
  const btn = document.getElementById(type === 'download' ? 'downloadBtn' : 'shareBtn');
  const originalText = btn.textContent;

  btn.disabled = true;
  btn.textContent = '處理中...';

  try {
    const canvas = await makeCanvas(2);
    // 使用 JPEG 格式，品質 0.9，確保在手機上運作穩定且檔案輕巧
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.9));
    const filename = fileBaseName() + '.jpg';

    if (type === 'share') {
      const file = new File([blob], filename, { type: 'image/jpeg' });
      // 判斷手機瀏覽器是否支援直接分享檔案
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title: 'RENE CELL 保養配置圖' });
      } else {
        // 若不支援分享，自動降級改為下載
        triggerDownload(blob, filename);
      }
    } else {
      triggerDownload(blob, filename);
    }
  } catch (e) {
    console.error(e);
    alert('圖片產生失敗，請確認網路環境或權限');
  } finally {
    btn.disabled = false;
    btn.textContent = originalText;
  }
}

// 觸發下載輔助函式
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.download = filename;
  a.href = url;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
