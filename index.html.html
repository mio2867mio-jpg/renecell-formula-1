<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RENE CELL 保養配置圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --ink:#2B1D14;
    --coffee:#3B2A20;
    --coffee-deep:#241812;
    --cream:#F6EFE2;
    --cream-soft:#FBF7EE;
    --gold:#C6A15B;
    --gold-soft:#E4CE9C;
    --line: rgba(43,29,20,0.14);
    --shadow: 0 18px 40px -18px rgba(36,24,18,0.35);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(198,161,91,0.12), transparent 60%),
      var(--cream);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px;margin:0 auto;padding:26px 16px 90px;}

  /* Header */
  .brandbar{padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--line);}
  .mark{font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500; letter-spacing:0.14em; font-size:12.5px; color:var(--gold); text-transform:uppercase;}
  h1{font-family:'Noto Serif TC', serif; font-weight:900; font-size:24px; letter-spacing:0.02em; margin:4px 0 0; color:var(--coffee-deep);}
  .sub{color:#7A6650; font-size:12.5px; margin-top:4px;}

  /* Card shell */
  .card{background:var(--cream-soft); border:1px solid var(--line); border-radius:14px; padding:18px; margin-bottom:16px;}
  .card h2{font-family:'Noto Serif TC', serif; font-size:14.5px; font-weight:700; margin:0 0 13px; color:var(--coffee); display:flex; align-items:center; gap:8px;}
  .card h2::before{content:''; width:13px;height:13px;border-radius:50%; background:var(--gold-soft); border:1.5px solid var(--gold); flex:0 0 auto;}
  .card .desc-line{font-size:11.5px;color:#8A7358;margin:-8px 0 12px;}

  /* Inputs */
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  label{display:block; font-size:11.5px; color:#8A7358; margin-bottom:5px; letter-spacing:0.03em;}
  input[type=text], input[type=date], textarea, select{
    width:100%; padding:9px 11px; border-radius:8px; border:1px solid var(--line);
    background:#fff; color:var(--ink); font-family:'Noto Sans TC', sans-serif; font-size:13.5px;
  }
  textarea{resize:vertical; min-height:50px;}
  .field{margin-bottom:11px;}
  .field:last-child{margin-bottom:0;}

  /* Generic multi-select pill group */
  .pillgroup{display:flex; flex-wrap:wrap; gap:7px;}
  .pill{
    font-size:12px; padding:6px 13px; border-radius:999px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:#8A7358; user-select:none;
  }
  .pill.on{background:var(--coffee); color:var(--cream); border-color:var(--coffee);}

  /* Category tabs */
  .tabs{display:flex; gap:6px; margin-bottom:14px; overflow-x:auto; padding-bottom:2px;}
  .tab{flex:0 0 auto; text-align:center; padding:8px 13px; border-radius:999px; border:1px solid var(--line); background:#fff; color:#8A7358; font-size:12.5px; cursor:pointer; white-space:nowrap;}
  .tab.active{background:var(--coffee); color:var(--cream); border-color:var(--coffee);}
  .cat-panel{display:none;}
  .cat-panel.active{display:block;}

  /* Product card */
  .prod{border:1px solid var(--line); background:#fff; border-radius:12px; margin-bottom:10px; overflow:hidden;}
  .prod.selected{border-color:var(--gold);}
  .prod-head{display:flex; gap:12px; padding:12px; cursor:pointer;}
  .thumb{width:52px;height:52px;border-radius:10px;flex:0 0 auto; overflow:hidden; position:relative; background:var(--gold-soft); display:flex; align-items:center; justify-content:center;}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .thumb .fallback{font-family:'Noto Serif TC', serif; font-weight:700; color:var(--coffee-deep); font-size:19px;}
  .prod-body{flex:1; min-width:0; display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .prod-name{font-weight:700; font-size:13.5px; color:var(--coffee-deep);}
  .prod-desc{font-size:11.5px; color:#8A7358; margin-top:2px;}
  .checkbtn{flex:0 0 auto; width:23px;height:23px;border-radius:50%; border:1.5px solid var(--gold); background:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; color:transparent;}
  .prod.selected .checkbtn{background:var(--gold); color:#fff;}

  .prod-config{display:none; padding:0 14px 14px; border-top:1px dashed var(--line);}
  .prod.selected .prod-config{display:block; padding-top:12px;}

  .ampm-row{display:flex; gap:8px; margin-bottom:12px;}
  .ampm-btn{flex:1; text-align:center; padding:8px; border-radius:8px; border:1px solid var(--line); background:#FBF7EE; color:#8A7358; font-size:12.5px; cursor:pointer;}
  .ampm-btn.on{background:var(--coffee); color:var(--cream); border-color:var(--coffee);}

  .cfg-row{margin-bottom:10px;}
  .cfg-row:last-child{margin-bottom:0;}
  .cfg-label{font-size:11px; color:#8A7358; margin-bottom:5px;}
  .cfg-row select{font-size:13px; padding:8px 10px;}
  .custom-amount{margin-top:6px;}

  /* CTA */
  .cta-row{position:sticky; bottom:14px; display:flex; justify-content:center; margin-top:6px;}
  .cta{background:var(--coffee); color:var(--cream); border:none; padding:14px 32px; border-radius:999px; font-size:14.5px; font-weight:700; font-family:'Noto Serif TC', serif; letter-spacing:0.05em; cursor:pointer; box-shadow:var(--shadow);}
  .hint{font-size:11.5px; color:#8A7358; text-align:center; margin-top:8px;}

  /* Result view */
  #resultView{display:none;}
  .result-toolbar{display:flex; gap:9px; justify-content:center; margin-bottom:18px; flex-wrap:wrap;}
  .btn2{padding:10px 16px; border-radius:999px; font-size:12.5px; cursor:pointer; border:1px solid var(--coffee); background:transparent; color:var(--coffee); font-weight:700;}
  .btn2.primary{background:var(--coffee); color:var(--cream);}

  /* 底圖相框：完整鎖定底圖原始比例(1080x1920)，底圖不裁切、不變形 */
  .rx-frame{
    position:relative; width:100%; max-width:430px; margin:0 auto;
    aspect-ratio:1080/1920; border-radius:22px; overflow:hidden;
    background-size:100% 100%; background-position:center; background-repeat:no-repeat;
    box-shadow:var(--shadow);
  }
  /* 安全區：對齊底圖中間半透明卡片的實際位置，文字只會落在這個範圍內 */
  .rx-card{
    position:absolute; left:11.9%; right:11.9%; top:10.7%; bottom:10.7%;
    overflow:hidden;
  }
  /* 標題區：獨立於白色安全區之外，貼在底圖最上方（米色牆面區塊） */
  .rx-frame-title{
    position:absolute; top:0; left:0; right:0; height:10.5%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 12px; z-index:2;
  }
  /* 簽名區：獨立於白色安全區之外，貼在底圖最下方 */
  .rx-frame-sign{
    position:absolute; bottom:0; left:0; right:0; height:10.5%;
    display:flex; align-items:center; justify-content:center;
    text-align:center; padding:0 12px; z-index:2;
  }
  .rx-sign-inner{font-family:'Cormorant Garamond', serif; font-style:italic; font-size:12px; color:var(--coffee-deep); letter-spacing:.04em; text-shadow:0 1px 6px rgba(255,255,255,0.85), 0 0 2px rgba(255,255,255,0.6);}
  .rx-sign-inner b{font-weight:700; font-style:normal; color:var(--gold);}
  .rx-inner{ transform-origin: top left; }

  /* 標題區：放在白色安全框「外面」，貼在底圖最上方留白處 */
  .rx-frame-head{
    position:absolute; top:0; left:0; right:0; height:10.7%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 8%;
  }
  .rx-frame-head .rx-mark{ font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500; letter-spacing:0.22em; font-size:11px; color:var(--cream-soft); text-transform:uppercase; text-shadow:0 1px 5px rgba(36,24,18,0.45);}
  .rx-frame-head .rx-title{ font-family:'Noto Serif TC', serif; font-weight:900; font-size:18px; color:var(--cream-soft); margin-top:3px; text-shadow:0 1px 6px rgba(36,24,18,0.5);}

  /* 署名區：放在白色安全框「外面」，貼在底圖最下方留白處，代表這份配置是誰做的 */
  .rx-frame-foot{
    position:absolute; bottom:0; left:0; right:0; height:10.7%;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  .rx-signoff{ font-size:11px; color:var(--cream-soft); text-shadow:0 1px 5px rgba(36,24,18,0.45); letter-spacing:0.03em;}
  .rx-signoff .lbl{ font-family:'Cormorant Garamond', serif; font-style:italic; font-size:9.5px; letter-spacing:.16em; text-transform:uppercase; opacity:.9; margin-right:5px;}
  .rx-signoff b{ font-family:'Noto Serif TC', serif; font-size:13px; font-weight:700;}

  /* 商品勾選結果標籤（用法／區域） */
  .rx-tags{display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;}
  .rx-tag{font-size:9.5px; padding:2px 8px; border-radius:999px; background:var(--gold-soft); color:var(--coffee-deep); white-space:nowrap;}
  .rx-tag.alt{background:#EFE6D3; color:#8A7358;}
  .rx-head{text-shadow:0 1px 6px rgba(255,255,255,0.85), 0 0 2px rgba(255,255,255,0.6);}
  .rx-mark{font-family:'Cormorant Garamond', serif; font-style:italic; font-size:11.5px; letter-spacing:0.22em; color:var(--gold); text-transform:uppercase;}
  .rx-title{font-family:'Noto Serif TC', serif; font-weight:900; font-size:21px; color:var(--coffee-deep); margin-top:3px;}

  .rx-meta{display:flex; flex-wrap:wrap; gap:10px 16px; border-top:1px dashed var(--gold-soft); border-bottom:1px dashed var(--gold-soft); padding:10px 8px; margin-bottom:16px; font-size:12px; color:var(--coffee); background:rgba(255,255,255,0.5); border-radius:8px;}
  .rx-meta div span{display:block; font-size:10px; color:#8A7358; margin-bottom:2px;}

  .rx-section{margin-bottom:15px;}
  .rx-section-title{font-family:'Noto Serif TC', serif; font-weight:700; font-size:13px; color:var(--coffee-deep); margin-bottom:8px; display:flex; align-items:center; gap:8px;}
  .rx-section-title::before{content:''; width:16px; height:1px; background:var(--gold);}

  .rx-item{display:flex; gap:9px; align-items:flex-start; margin-bottom:8px; background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 10px;}
  .rx-num{flex:0 0 auto; font-family:'Noto Serif TC', serif; font-size:16px; color:var(--gold); font-weight:700; line-height:1; padding-top:2px;}
  .rx-item .thumb{width:46px;height:46px;border-radius:9px;}
  .rx-item .txt{flex:1; min-width:0;}
  .rx-item .name{font-weight:700; font-size:12.5px; color:var(--coffee-deep);}
  .rx-item .meta-line{font-size:10.8px; color:#A08A6E; margin-top:2px; line-height:1.55;}
  .rx-item .meta-line b{display:inline-block; min-width:32px; color:var(--gold); font-weight:700; margin-right:2px;}

  .rx-notes{font-size:11.5px; color:#8A7358; line-height:1.9; margin-top:14px; padding:12px 10px 6px; border-top:1px dashed var(--gold-soft); background:rgba(255,255,255,0.5); border-radius:8px;}
  .rx-notes .ntitle{font-weight:700; color:var(--coffee-deep); margin-bottom:4px; font-family:'Noto Serif TC', serif; font-size:12.5px;}
  .rx-notes ul{margin:0; padding-left:18px;}
  .rx-freetext{font-size:11.5px; color:#8A7358; line-height:1.7; margin-top:10px; white-space:pre-wrap;}

  .rx-foot{display:flex; justify-content:space-between; align-items:flex-end; margin-top:16px; background:rgba(255,255,255,0.5); border-radius:10px; padding:8px 10px;}
  .rx-foot .stamp{width:50px;height:50px;border-radius:50%; border:1.5px solid var(--gold); display:flex; align-items:center; justify-content:center; text-align:center; font-family:'Noto Serif TC', serif; font-size:8.5px; color:var(--gold); line-height:1.2; letter-spacing:.05em; transform:rotate(-8deg);}
  .rx-foot .brandline{font-family:'Cormorant Garamond', serif; font-style:italic; font-size:10.5px; color:#8A7358; letter-spacing:.05em;}

  .empty{text-align:center; color:#8A7358; font-size:12.5px; padding:16px 0;}

  @media (max-width:520px){ .grid2{grid-template-columns:1fr;} h1{font-size:21px;} }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===================== BUILD VIEW ===================== -->
  <div id="buildView">
    <div class="brandbar">
      <div class="mark">Rene · Cell</div>
      <h1>保養配置圖產生器</h1>
      <div class="sub">勾選商品、設定用法用量，一鍵產生客戶專屬配置圖</div>
    </div>

    <div class="card">
      <h2>客戶基本資料</h2>
      <div class="grid2">
        <div class="field">
          <label>客戶姓名</label>
          <input type="text" id="custName" placeholder="王小姐">
        </div>
        <div class="field">
          <label>配置日期</label>
          <input type="date" id="custDate">
        </div>
      </div>
      <div class="field">
        <label>配置服務人員（顯示於配置圖最下方署名區）</label>
        <input type="text" id="staffName" placeholder="美容師 / 顧問姓名">
      </div>
      <div class="field">
        <label>膚況重點（可複選）</label>
        <div class="pillgroup" id="skinPills"></div>
      </div>
      <div class="field">
        <label>備註（選填，會顯示在配置圖下方）</label>
        <textarea id="custNote" placeholder="例：兩週後回訪追蹤膚況"></textarea>
      </div>
    </div>

    <div class="card">
      <h2>商品選擇與設定</h2>
      <div class="desc-line">點商品展開後可設定 早/晚使用、用量、用法、使用區域</div>
      <div class="tabs" id="tabs"></div>
      <div id="catPanels"></div>
    </div>

    <div class="card">
      <h2>注意事項（可複選，會顯示在配置圖最下方）</h2>
      <div class="pillgroup" id="notePills"></div>
    </div>

    <div class="cta-row">
      <button class="cta" onclick="generateResult()">產生客戶配置圖</button>
    </div>
    <div class="hint">商品圖片目前為佔位圖示，之後把真實圖片放進 images/ 資料夾並取相同檔名即可自動替換</div>
  </div>

  <!-- ===================== RESULT VIEW ===================== -->
  <div id="resultView">
    <div class="result-toolbar">
      <button class="btn2" onclick="backToEdit()">← 重新編輯</button>
      <button class="btn2 primary" onclick="downloadImage()">下載圖片</button>
      <button class="btn2 primary" onclick="shareImage()">分享（LINE等）</button>
    </div>

    <div class="rx-frame" id="rxFrame">
      <div class="rx-frame-head">
        <div class="rx-mark">Rene · Cell Prescription</div>
        <div class="rx-title">專屬保養配置建議</div>
      </div>

      <div class="rx-card" id="rxCard">
        <div class="rx-inner" id="rxInner">
          <div class="rx-meta">
            <div><span>客戶</span><b id="outName">—</b></div>
            <div><span>膚況重點</span><b id="outSkin">—</b></div>
            <div><span>配置日期</span><b id="outDate">—</b></div>
          </div>

          <div id="rxSections"></div>

          <div class="rx-notes" id="rxNotesBlock" style="display:none;">
            <div class="ntitle">注意事項</div>
            <ul id="rxNotesList"></ul>
          </div>
          <div class="rx-freetext" id="outFreeNote"></div>

          <div class="rx-foot">
            <div class="brandline">Rene · Cell 韓國原裝保養</div>
            <div class="stamp">RENE<br>CELL<br>認證</div>
          </div>
        </div>
      </div>

      <div class="rx-frame-foot">
        <div class="rx-signoff"><span class="lbl">配置服務</span><b id="outStaff">—</b></div>
      </div>
    </div>
  </div>

</div>

const CATS = [

/* ============ 狀態 ============ */
let skinState = new Set();
let noteState = new Set();
let state = {}; // { prodId: {selected, am, pm, amount, amountCustom, usage:Set, area:Set} }
PRODUCTS.forEach(p => state[p.id] = {
  selected:false, am:false, pm:false,
  amount:p.defAmount, amountCustom:p.defAmountCustom || '',
  usage:new Set(p.defUsage), area:new Set(p.defArea)
});

/* ============ 共用 ============ */
function thumbHTML(p, size){
  return `<div class="thumb" style="${size?`width:${size}px;height:${size}px;`:''}">
    <img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <span class="fallback" style="display:none;">${p.name.charAt(0)}</span>
  </div>`;
}

/* ============ 膚況 / 注意事項 pill 區塊 ============ */
function renderSkinPills(){
  document.getElementById('skinPills').innerHTML = SKIN_OPTIONS.map(s=>
    `<div class="pill" data-skin="${s}" onclick="toggleSkin('${s}')">${s}</div>`
  ).join('');
}
function toggleSkin(s){
  if(skinState.has(s)) skinState.delete(s); else skinState.add(s);
  document.querySelector(`#skinPills .pill[data-skin="${s}"]`).classList.toggle('on', skinState.has(s));
}
function renderNotePills(){
  document.getElementById('notePills').innerHTML = NOTE_OPTIONS.map(n=>
    `<div class="pill" data-note="${n}" onclick="toggleNote('${n}')">${n}</div>`
  ).join('');
}
function toggleNote(n){
  if(noteState.has(n)) noteState.delete(n); else noteState.add(n);
  document.querySelector(`#notePills .pill[data-note="${n}"]`).classList.toggle('on', noteState.has(n));
}

/* ============ 商品清單 UI ============ */
function renderTabs(){
  document.getElementById('tabs').innerHTML = CATS.map((c,i)=>
    `<div class="tab ${i===0?'active':''}" data-cat="${c.id}" onclick="switchTab('${c.id}')">${c.name}</div>`
  ).join('');
}
function switchTab(catId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.cat===catId));
  document.querySelectorAll('.cat-panel').forEach(p=>p.classList.toggle('active', p.dataset.cat===catId));
}

function amountSelectHTML(p){
  const cur = state[p.id].amount;
  return `<select onchange="setAmount('${p.id}', this.value)">
    ${AMOUNT_OPTIONS.map(o=>`<option value="${o}" ${o===cur?'selected':''}>${o}</option>`).join('')}
  </select>
  <input type="text" class="custom-amount" id="customAmount-${p.id}" placeholder="輸入自訂用量"
    style="display:${cur==='自訂'?'block':'none'};" value="${state[p.id].amountCustom||''}"
    oninput="setAmountCustom('${p.id}', this.value)">`;
}
function pillGroupHTML(p, type, options){
  return `<div class="pillgroup">
    ${options.map(o=>`<div class="pill ${state[p.id][type].has(o)?'on':''}" onclick="toggleProdOpt('${p.id}','${type}','${o}')">${o}</div>`).join('')}
  </div>`;
}

  const wrap = document.getElementById('catPanels');
  wrap.innerHTML = CATS.map((c,i) => `
    <div class="cat-panel ${i===0?'active':''}" data-cat="${c.id}">
      ${PRODUCTS.filter(p=>p.cat===c.id).map(p=>`
        <div class="prod" id="prod-${p.id}">
          <div class="prod-head" onclick="toggleSelect('${p.id}')">
            ${thumbHTML(p)}
            <div class="prod-body">
              <div>
                <div class="prod-name">${p.name}</div>
                <div class="prod-desc">${p.desc}</div>
              </div>
              <div class="checkbtn">✓</div>
            </div>
          </div>
          <div class="prod-config" id="cfg-${p.id}">
            <div class="ampm-row">
              <div class="ampm-btn" id="am-${p.id}" onclick="toggleTime('${p.id}','am')">白天 AM</div>
              <div class="ampm-btn" id="pm-${p.id}" onclick="toggleTime('${p.id}','pm')">晚上 PM</div>
            </div>
            <div class="cfg-row">
              <div class="cfg-label">用量</div>
              <div id="amountWrap-${p.id}">${amountSelectHTML(p)}</div>
            </div>
            <div class="cfg-row">
              <div class="cfg-label">用法（可複選）</div>
              <div id="usageWrap-${p.id}">${pillGroupHTML(p,'usage',USAGE_OPTIONS)}</div>
            </div>
            <div class="cfg-row">
              <div class="cfg-label">使用區域（可複選）</div>
              <div id="areaWrap-${p.id}">${pillGroupHTML(p,'area',AREA_OPTIONS)}</div>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleSelect(id){
  state[id].selected = !state[id].selected;
  if(!state[id].selected){ state[id].am = false; state[id].pm = false; }
  refreshProdUI(id);
}
function toggleTime(id, slot){
  event.stopPropagation();
  state[id][slot] = !state[id][slot];
  refreshProdUI(id);
}
function toggleProdOpt(id, type, val){
  const set = state[id][type];
  if(set.has(val)) set.delete(val); else set.add(val);
  refreshProdUI(id);
}
function setAmount(id, val){
  state[id].amount = val;
  document.getElementById(`customAmount-${id}`).style.display = (val==='自訂') ? 'block' : 'none';
}
function setAmountCustom(id, val){
  state[id].amountCustom = val;
}
function refreshProdUI(id){
  const el = document.getElementById('prod-'+id);
  el.classList.toggle('selected', state[id].selected);
  document.getElementById('am-'+id).classList.toggle('on', state[id].am);
  document.getElementById('pm-'+id).classList.toggle('on', state[id].pm);
  document.getElementById('usageWrap-'+id).innerHTML = pillGroupHTML(PRODUCTS.find(p=>p.id===id),'usage',USAGE_OPTIONS);
  document.getElementById('areaWrap-'+id).innerHTML = pillGroupHTML(PRODUCTS.find(p=>p.id===id),'area',AREA_OPTIONS);
}

/* ============ 產生結果卡 ============ */
function resolveAmount(id){
  const s = state[id];
  return s.amount === '自訂' ? (s.amountCustom || '自訂用量') : s.amount;
}
function itemLineHTML(p, index){
  const s = state[p.id];
  return `
    <div class="rx-item">
      <div class="rx-num">${circleNum(index)}</div>
      ${thumbHTML(p)}
      <div class="txt">
        <div class="name">${p.name}</div>
        <div class="meta-line"><b>用量</b> ${resolveAmount(p.id)}</div>
        <div class="rx-tags">
          ${[...s.usage].map(u=>`<span class="rx-tag">${u}</span>`).join('')}
          ${[...s.area].map(a=>`<span class="rx-tag alt">${a}</span>`).join('')}
        </div>
      </div>
    </div>`;
}

function generateResult(){
  document.getElementById('outName').textContent = document.getElementById('custName').value || '—';
  document.getElementById('outSkin').textContent = skinState.size ? [...skinState].join('、') : '—';
  const d = document.getElementById('custDate').value;
  document.getElementById('outDate').textContent = d ? d.replaceAll('-','/') : '—';
  document.getElementById('outFreeNote').textContent = document.getElementById('custNote').value || '';
  document.getElementById('outStaff').textContent = document.getElementById('staffName').value || '—';

  const amList = PRODUCTS.filter(p => state[p.id].selected && state[p.id].am);
  const pmList = PRODUCTS.filter(p => state[p.id].selected && state[p.id].pm);

  let html = '';
  if(amList.length){
    html += `<div class="rx-section"><div class="rx-section-title">☀️ 白天 AM 使用順序</div>
      ${amList.map((p,i)=>itemLineHTML(p,i)).join('')}
    </div>`;
  }
  if(pmList.length){
    html += `<div class="rx-section"><div class="rx-section-title">🌙 晚上 PM 使用順序</div>
      ${pmList.map((p,i)=>itemLineHTML(p,i)).join('')}
    </div>`;
  }
  document.getElementById('rxSections').innerHTML = html || `<div class="empty">尚未勾選商品</div>`;

  const notesBlock = document.getElementById('rxNotesBlock');
  if(noteState.size){
    document.getElementById('rxNotesList').innerHTML = [...noteState].map(n=>`<li>${n}</li>`).join('');
    notesBlock.style.display = 'block';
  } else {
    notesBlock.style.display = 'none';
  }

  document.getElementById('buildView').style.display = 'none';
  document.getElementById('resultView').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
  fitRxContent();
}

/* 內容太多時，等比例縮小整個內容區塊，確保不會超出底圖中的安全區（不裁切文字） */
function fitRxContent(){
  const box = document.getElementById('rxCard');
  const inner = document.getElementById('rxInner');
  inner.style.transform = 'scale(1)';
  inner.style.width = '100%';
  requestAnimationFrame(()=>{
    const availH = box.clientHeight;
    const neededH = inner.scrollHeight;
    if(neededH > availH){
      const scale = Math.max(0.5, availH / neededH);
      inner.style.width = (100/scale) + '%';
      inner.style.transform = `scale(${scale})`;
    }
  });
}
window.addEventListener('resize', ()=>{ if(document.getElementById('resultView').style.display==='block') fitRxContent(); });

function backToEdit(){
  document.getElementById('resultView').style.display = 'none';
  document.getElementById('buildView').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ============ 輸出圖片 ============ */
function renderCardCanvas(){
  fitRxContent();
  const frame = document.getElementById('rxFrame');
  return new Promise(resolve=>{
    // 等 fitRxContent 的 requestAnimationFrame 跑完，確保縮放已套用再截圖
    requestAnimationFrame(()=> requestAnimationFrame(()=> resolve() ));
  }).then(()=> html2canvas(frame, {scale:1080/frame.clientWidth, backgroundColor:null, useCORS:true}));
}
function fileNamePrefix(){
  const name = document.getElementById('outName').textContent.trim();
  return `RENECELL-配置圖${name && name!=='—' ? '-'+name : ''}`;
}
function downloadImage(){
  renderCardCanvas().then(canvas=>{
    const link = document.createElement('a');
    link.download = fileNamePrefix()+'.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(err=>{
    alert('圖片產生失敗，請改用截圖方式保存畫面');
    console.error(err);
  });
}
function shareImage(){
  renderCardCanvas().then(canvas=>{
    canvas.toBlob(async blob=>{
      const file = new File([blob], fileNamePrefix()+'.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file], title:'RENE CELL 專屬保養配置建議'});
        }catch(e){ /* 使用者取消分享，不做任何事 */ }
      } else {
        const link = document.createElement('a');
        link.download = fileNamePrefix()+'.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        alert('此裝置不支援直接分享，已改為下載圖片，請至相簿選擇用 LINE 傳送');
      }
    }, 'image/png');
  }).catch(err=>{
    alert('圖片產生失敗，請改用截圖方式保存畫面');
    console.error(err);
  });
}
