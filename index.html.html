<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RENE CELL 保養配置圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --brown:#4f3b31; --brown2:#6d574a; --ink:#2f2926; --muted:#8a7b70;
  --cream:#f7f2ea; --paper:#fffdfa; --gold:#c7a866; --line:#eadfcc;
  --am:#d9eef3; --amHead:#bcdce4; --pm:#5a463d; --pmBody:#eee9e2;
  --shadow:0 18px 55px rgba(65,45,31,.15); --radius:26px;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Noto Sans TC',system-ui,sans-serif;background:linear-gradient(135deg,#eee6da,#fffaf2);color:var(--ink)}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:0;outline:none}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:min(460px,100%);background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.85);border-radius:34px;box-shadow:var(--shadow);padding:34px;text-align:center;backdrop-filter:blur(8px)}
.login-title{font-family:'Cormorant Garamond',serif;letter-spacing:.22em;color:var(--brown2);font-size:20px;margin-bottom:8px}.login h1{font-family:'Noto Serif TC',serif;font-size:31px;margin:0 0 14px;color:var(--brown)}
.login input{width:100%;height:52px;border-radius:18px;border:1px solid var(--line);padding:0 16px;font-size:18px;text-align:center;background:white;margin:12px 0}.login button{width:100%;height:52px;border-radius:18px;background:var(--brown);color:white;font-weight:900;font-size:18px}.login-note{color:var(--muted);font-size:13px;line-height:1.7;margin-top:16px}.error{display:none;color:#b34949;font-weight:700;margin-top:8px}
.app{display:none;max-width:1500px;margin:0 auto;padding:20px 18px 60px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(247,242,234,.86);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.9);box-shadow:0 8px 26px rgba(65,45,31,.08);border-radius:0 0 28px 28px;padding:12px;margin-bottom:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center}
.action{height:48px;padding:0 22px;border-radius:999px;font-weight:900;font-size:16px;background:white;color:var(--brown);box-shadow:0 5px 15px rgba(65,45,31,.08);transition:all 0.2s}.action:disabled{opacity:0.6;cursor:not-allowed}.action:active{transform:scale(0.96)}.action.primary{background:var(--brown);color:white}.action.blue{background:#e0f2f6;color:#254f5a}.action.line{background:#06c755;color:white}
.notice{background:#fff8e8;border:1px solid #ead6a6;color:#6a5639;border-radius:20px;padding:12px 16px;line-height:1.6;margin-bottom:16px;font-weight:900;text-align:center}
.notice-title{font-weight:900;color:#5a463d;margin-bottom:8px;font-size:15px;display:flex;align-items:center;gap:6px}
.notice-list{margin:0;padding-left:22px}
.notice-list li{margin-bottom:6px}
.notice-list b{color:#8b6d42;font-weight:800}
.layout{display:grid;grid-template-columns:minmax(360px,470px) 1fr;gap:18px;align-items:start}
.panel{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.92);border-radius:28px;box-shadow:var(--shadow);padding:22px;scroll-margin-top: 80px;}
.panel h2{font-family:'Noto Serif TC',serif;margin:0 0 16px;color:var(--brown);font-size:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:block}.label{font-size:13px;color:var(--muted);font-weight:900;margin:0 0 7px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:16px;background:white;padding:12px 14px;font-size:16px;outline:none;transition:border-color 0.2s}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}.field textarea{height:86px;resize:vertical}
.wide{grid-column:1/-1}.tags{display:flex;flex-wrap:wrap;gap:8px}.tag{display:inline-flex;align-items:center;gap:6px;background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:800;color:var(--brown);cursor:pointer;transition:all 0.2s}.tag input:checked + span{color:var(--brown)}
.category{margin:18px 0}
.category-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--brown);margin:0 0 10px;display:flex;align-items:center;gap:8px}
.category-title:before{content:'';width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 5px rgba(199,168,102,.18)}
.products{display:grid;grid-template-columns:1fr;gap:10px}
.product-card{position:relative;background:white;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 5px 16px rgba(65,45,31,.05);display:flex;flex-direction:column;gap:10px;transition:all 0.2s}
.product-card.selected{border-color:#b8924f;box-shadow:0 0 0 3px rgba(199,168,102,.22);background:#fffaf2}
.product-card.needs-time{border-color:#e45b4b;box-shadow:0 0 0 3px rgba(228,91,75,.3);background:#fff5f2}
.time-warning{background:#fcebe8;color:#c0392b;border:1px solid #f5c6cb;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.product-main{display:grid;grid-template-columns:58px 1fr 34px;align-items:center;gap:12px;cursor:pointer;border:none;background:transparent;padding:0;width:100%;text-align:left}
.product-main .check-dot{position:static;grid-column:3;width:30px;height:30px;border-radius:50%;border:1px solid #d6bc86;background:#fbf7ef;color:#8b6e36;display:flex;align-items:center;justify-content:center;font-weight:900;transition:all 0.2s}
.product-card.selected .check-dot{background:var(--gold);color:white;border-color:var(--gold)}
.product-img{width:58px;height:58px;object-fit:cover;border-radius:14px;background:#f1f1ef}
.img-fallback{display:flex;align-items:center;justify-content:center;background:#efe4d3;color:#8b6e36;font-weight:900;font-size:1.1em;border-radius:14px}
.product-name{font-weight:900;line-height:1.25;font-size:17px;color:#1f1a17;text-align:left}

/* 順序微調改為由左至右橫向排列 */
.order-box{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.order-row{display:flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 10px 6px 6px;gap:8px;box-shadow:0 2px 8px rgba(65,45,31,.04);max-width:100%}
.order-num{width:24px;height:24px;background:#f1e7d1;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#80653f;font-weight:900;font-size:12px;flex-shrink:0}
.order-img{width:32px;height:32px;object-fit:cover;border-radius:50%;flex-shrink:0}
.order-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.move-btns{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.move-btns button{width:26px;height:26px;border-radius:50%;background:#f4eee4;color:var(--brown);font-weight:900;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.move-btns button:hover{background:#eaddc8}

.inline-config{margin-top:4px;padding:12px;border-top:1px dashed #e4d7c5;background:#fffaf4;border-radius:14px}
.inline-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.cfg-label{font-size:13px;color:#7d6a5d;font-weight:900;margin-bottom:6px}
.mini-remove{border-radius:999px;padding:5px 12px;background:#f3ebe2;color:var(--brown);font-weight:900;font-size:13px;transition:background 0.2s}
.mini-remove:hover{background:#eadfcc}
.cfg-wide {margin-bottom:12px}
.cfg-wide .seg {display:flex;gap:8px}
.cfg-wide .seg button {flex:1;height:40px;border-radius:12px;background:white;border:1px solid var(--line);font-weight:900;color:var(--muted);transition:all 0.2s}
/* 白天/晚上點選狀態更明顯 */
.cfg-wide .seg button.active {background:var(--brown);color:white;border-color:var(--brown);box-shadow:0 4px 12px rgba(79,59,49,0.3);transform:translateY(-1px)}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cfg-grid label{display:block}
.cfg-grid select{width:100%;height:40px;border-radius:12px;border:1px solid var(--line);background:white;padding:0 10px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}

.preview-panel{overflow:auto}.poster-shell{min-height:300px;display:flex;justify-content:center;align-items:flex-start;padding:10px}

/* 基底比例設定為 2:3，尺寸為 800x1200 */
.poster{width:800px;height:1200px;background:var(--paper);border-radius:34px;box-shadow:var(--shadow);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:20px;padding:32px;background-color:#f5f1eb}
.poster>*:not(.poster-bg){position:relative;z-index:1}

.poster-top{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:stretch}
.poster-head{background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(248,245,240,.78));border:1px solid rgba(255,255,255,.72);border-radius:30px;padding:26px 20px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px;box-shadow:0 8px 24px rgba(65,45,31,.08);backdrop-filter:blur(3px)}
.brand{font-family:'Cormorant Garamond',serif;letter-spacing:.22em;text-align:center;color:#7b6556;font-weight:600;font-size:18px;line-height:1.45}
.poster-title{font-family:'Noto Serif TC',serif;text-align:center;font-weight:900;color:#2e2521;font-size:36px;line-height:1.2;letter-spacing:.06em}
.poster-meta{display:flex;flex-direction:column;gap:14px;min-width:0}
.info-card{width:100%;background:rgba(255,255,255,.9);border-radius:24px;padding:20px;box-shadow:0 8px 20px rgba(65,45,31,.08);backdrop-filter:blur(2px)}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.info-row b{display:block;color:#8a7b70;font-size:13px;margin-bottom:6px}
.info-row span{font-weight:900;font-size:18px;line-height:1.35;white-space:pre-wrap;word-break:break-word}
.info-row.wide{grid-column:1 / -1}
.meta-bottom{display:grid;grid-template-columns:1fr;gap:14px;align-items:stretch}
.side-note{width:100%;background:rgba(255,255,255,.88);border-radius:24px;padding:18px 20px;box-shadow:0 8px 20px rgba(65,45,31,.08);backdrop-filter:blur(2px)}
.note-title{font-family:'Noto Serif TC',serif;font-weight:900;color:#4c3b33;margin-bottom:10px;font-size:18px}
.note-tags{display:flex;gap:8px;flex-wrap:wrap}
.note-pill{background:#fff;border-radius:999px;padding:8px 12px;color:#8b6d42;font-weight:800;font-size:13px;border:1px solid rgba(199,168,102,.18)}
.poster-main{display:grid;grid-template-rows:1fr 1fr;gap:20px;min-width:0;flex:1}
.section{border-radius:32px;overflow:hidden;border:1px solid rgba(255,255,255,.65);box-shadow:0 8px 24px rgba(65,45,31,.08);display:flex;flex-direction:column;backdrop-filter:blur(2px)}
.section.am{background:rgba(229,243,246,.88)}.section.pm{background:rgba(236,230,223,.9)}
.section-head{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:26px}
.am .section-head{background:rgba(203,232,239,.92);color:#284e58}.pm .section-head{background:rgba(89,66,56,.94);color:white}
.hint{font-family:'Noto Sans TC';font-size:14px;border-radius:999px;padding:8px 14px;background:rgba(255,255,255,.75);font-weight:900;color:inherit}
.cards{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-content:start;min-height:0;flex:1}
.poster-card{background:rgba(255,255,255,.95);border-radius:22px;min-height:190px;padding:14px 12px;position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 5px 14px rgba(70,50,38,.08);overflow:hidden}
.num{position:absolute;left:10px;top:10px;width:30px;height:30px;border:1px solid #d7b873;color:#a67a2c;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px}
.card-img{width:86px;height:86px;border-radius:20px;object-fit:cover;background:#eee}
.card-name{font-weight:900;text-align:center;font-size:16px;line-height:1.25;min-height:40px;display:flex;align-items:center}
.chip{background:#f1e7d1;color:#80653f;border-radius:999px;padding:6px 10px;font-weight:900;font-size:13px;line-height:1.1;text-align:center;max-width:100%}
.cards.compact{gap:12px}.cards.compact .poster-card{min-height:170px;padding:12px 10px}.cards.compact .card-img{width:74px;height:74px}.cards.compact .card-name{font-size:14px}.cards.compact .chip{font-size:11px;padding:4px 8px}

.hidden-export{position:fixed;left:-3000px;top:0;z-index:-1;width:800px;overflow:visible;}
.export-mode{
  transform:none!important;
  margin:0!important;
  border-radius:0!important;
  box-shadow:none!important;
  width:800px!important;
  min-height:1200px!important;
  height:max-content!important;
  background-color:#f5f1eb!important;
}
.export-mode .poster-bg{border-radius:0!important}

@media(max-width:1100px){.layout{grid-template-columns:1fr}.products{grid-template-columns:repeat(2,1fr)}.poster{transform:scale(.85);transform-origin:top center;margin-bottom:-140px}.poster-top{grid-template-columns:1fr}.meta-bottom{grid-template-columns:1fr}}@media(max-width:720px){.app{padding:12px 10px 50px}.topbar{border-radius:0 0 20px 20px}.action{height:44px;font-size:14px;padding:0 14px}.panel{padding:16px;border-radius:22px}.form-grid{grid-template-columns:1fr}.products{grid-template-columns:1fr;gap:10px}.product-card{min-height:148px}.poster-shell{padding:0;justify-content:flex-start}.poster{transform:scale(.42);margin-bottom:-650px}.preview-panel{padding:0;overflow:auto}.cfg-grid{grid-template-columns:1fr}}

.topbar-generate{justify-content:center}
.bottom-actions-panel{text-align:center}
.bottom-actions{display:flex;gap:14px;justify-content:center;align-items:center;flex-wrap:wrap}
.bottom-actions .action{min-width:180px;height:54px;font-size:18px}
@media(max-width:720px){
  .bottom-actions{display:grid;grid-template-columns:1fr;gap:12px}
  .bottom-actions .action{width:100%;min-width:0}
}

</style>
</head>
<body>
<div id="login" class="login"><div class="login-card"><div class="login-title">RENE CELL</div><h1>保養配置工具</h1><input id="password" type="password" placeholder="請輸入團隊密碼" onkeydown="if(event.key==='Enter') unlock()"><button onclick="unlock()">進入系統</button><div id="pwError" class="error">密碼錯誤，請重新輸入</div><div class="login-note">此工具限團隊內部教育與配置使用，請勿任意外流。</div></div></div>
<div id="app" class="app">
  <div class="topbar topbar-generate">
    <button id="generateBtnTop" class="action primary" onclick="generatePoster()">生成配置圖</button>
  </div>
  <div class="notice">請使用外部瀏覽器開啟</div>
    
  </div>
  <div class="layout">
    <div class="left-col">
      <section class="panel"><h2>顧客資料</h2><div class="form-grid">
        <label class="field"><div class="label">顧客姓名（可空白）</div><input id="customer" placeholder=""></label>
        <label class="field"><div class="label">配置日期</div><input id="date" type="date"></label>
        <div class="wide"><div class="label">膚況重點</div><div id="skinTags" class="tags"></div></div>
        <label class="field wide"><div class="label">注意事項</div><textarea id="notes" placeholder="例如：加強保濕、加強防曬、2週回訪"></textarea></label>
        <label class="field wide"><div class="label">配置者（可空白）</div><input id="provider" placeholder=""></label>
      </div></section>
      <section class="panel" style="margin-top:18px"><h2>順序微調</h2><div class="label">白天 AM</div><div id="amOrderBox" class="order-box"></div><div class="label" style="margin-top:14px">晚上 PM</div><div id="pmOrderBox" class="order-box"></div></section>
    </div>
    <div class="right-col">
      <section class="panel"><h2>選擇商品</h2><div id="productArea"></div></section>
      <section id="previewSection" class="panel preview-panel" style="margin-top:18px"><h2>配置圖預覽 (2:3 完美比例)</h2><div class="poster-shell"><div id="poster" class="poster"></div></div></section>
    </div>
  </div>
</div>
<script>

const PASSWORD='K24519811'; 

const catOrder=['清潔','精華液','霜類','乳液','特殊護理'];

const products=[
{id:'cleanser',cat:'清潔',name:'酵素潔顏粉',img:'cleanser.png',defaultTimes:['am','pm'],amountType:'適量',amountQty:'',method:'泡沫清潔',foam:'手起泡'},

{id:'regen',cat:'精華液',name:'再生修復精華',img:'regen.png',defaultTimes:['am','pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡'},
{id:'ampoule',cat:'精華液',name:'緊緻安瓶',img:'ampoule.png',defaultTimes:['pm'],amountType:'滴',amountQty:'3',method:'塗抹',foam:'手起泡'},
{id:'peptide_cream',cat:'霜類',name:'多肽霜',img:'peptide_cream.png',defaultTimes:['pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡'},

{id:'repair_cream',cat:'霜類',name:'保濕修護霜',img:'repair_cream.png',defaultTimes:['am','pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡'},
{id:'diamond_cb',cat:'霜類',name:'鑽石CB修護霜',img:'diamond_cb.png',defaultTimes:['am','pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡'},

{id:'sunscreen',cat:'霜類',name:'SPF 50防曬霜',img:'sunscreen.png',defaultTimes:['am'],amountType:'cm',amountQty:'2',method:'塗抹',foam:'手起泡'},
{id:'spot_cream',cat:'霜類',name:'美白淡斑霜',img:'spot_cream.png',defaultTimes:['pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡'},
{id:'antisens',cat:'乳液',name:'抗敏乳',img:'antisens.png',defaultTimes:['am','pm'],amountType:'適量',amountQty:'',method:'塗抹',foam:'手起泡'},
{id:'mask_119',cat:'特殊護理',name:'119面膜',img:'mask_119.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'厚敷',foam:'手起泡'},
{id:'mask_nutrition',cat:'特殊護理',name:'營養保濕面膜',img:'mask_nutrition.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'厚敷',foam:'手起泡'},
{id:'coconut_mask',cat:'特殊護理',name:'椰子面膜',img:'coconut_mask.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'厚敷',foam:'手起泡'},
{id:'bluelight_spray',cat:'特殊護理',name:'抗藍光防護噴霧',img:'bluelight_spray.png',defaultTimes:['am'],amountType:'適量',amountQty:'',method:'噴霧',foam:'手起泡'},
{id:'cpr_set',cat:'特殊護理',name:'CPR三階段保養套組',img:'cpr_set.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'塗抹',foam:'手起泡'},
{id:'whitening_2wk',cat:'特殊護理',name:'2週集中淡斑管理',img:'whitening_2wk.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'塗抹',foam:'手起泡'}
];
const state={cfg:{}, order:{am:[],pm:[]}};
products.forEach(p=>state.cfg[p.id]={...p,selected:false,am:false,pm:false});

function logout(){localStorage.removeItem('renecell_login');location.reload();}
function unlock(){if(document.getElementById('password').value===PASSWORD){localStorage.setItem('renecell_login','yes');document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';init();}else document.getElementById('pwError').style.display='block'}
function escapeHTML(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))}
function imgTag(p,cls){const fb=escapeHTML((p.name||'?').slice(0,1));return `<img class="${cls}" src="images/${escapeHTML(p.img)}" onerror="this.outerHTML='&lt;div class=&quot;${cls} img-fallback&quot;&gt;${fb}&lt;/div&gt;'" alt="${escapeHTML(p.name)}">`}

function init(){const d=new Date();document.getElementById('date').value=d.toISOString().slice(0,10);renderSkinTags();renderProducts();renderOrders();renderPoster();['customer','date','notes','provider'].forEach(id=>document.getElementById(id).addEventListener('input',renderPoster));}
if(localStorage.getItem('renecell_login')==='yes'){document.getElementById('login').style.display='none';document.getElementById('app').style.display='block';init();}
function renderSkinTags(){document.getElementById('skinTags').innerHTML=skinOptions.map(t=>`<label class="tag"><input type="checkbox" value="${escapeHTML(t)}" onchange="renderPoster()"><span>${escapeHTML(t)}</span></label>`).join('')}

function productConfigHTML(id,p){
  const qtyDisplay=(p.amountType==='滴'||p.amountType==='cm')?'':'display:none';
  const noTime=!p.am&&!p.pm;
  return `<div class="inline-config">
    <div class="inline-head">
      <div class="cfg-label">商品設定｜白天／晚上請至少選一項</div>
      <button type="button" class="mini-remove" onclick="toggleProduct('${id}')">移除</button>
    </div>
    ${noTime?'<div class="time-warning">⚠️ 尚未選擇時段，此商品暫不會出現在配置圖中</div>':''}
    <div class="cfg-wide">
      <div class="cfg-label">時段</div>
      <div class="seg">
        <button type="button" class="${p.am?'active':''}" onclick="setTime('${id}','am',${!p.am})">☀ 白天 AM</button>
        <button type="button" class="${p.pm?'active':''}" onclick="setTime('${id}','pm',${!p.pm})">☾ 晚上 PM</button>
      </div>
    </div>
    <div class="cfg-grid">
      <label>
        <div class="cfg-label">用量類型</div>
        <select onchange="setCfg('${id}','amountType',this.value)">
          <option ${p.amountType==='適量'?'selected':''}>適量</option>
          <option ${p.amountType==='少量'?'selected':''}>少量</option>
          <option ${p.amountType==='滴'?'selected':''}>滴</option>
          <option ${p.amountType==='cm'?'selected':''}>cm</option>
        </select>
      </label>
      <label style="${qtyDisplay}">
        <div class="cfg-label">數量</div>
        <select onchange="setCfg('${id}','amountQty',this.value)">
          ${(p.amountType==='cm'?['1','2']:['1','2','3','4','5']).map(n=>`<option ${String(p.amountQty||1)===n?'selected':''}>${n}</option>`).join('')}
        </select>
      </label>
      <label>
        <div class="cfg-label">用法</div>
        <select onchange="setCfg('${id}','method',this.value)">
          <option ${p.method==='塗抹'?'selected':''}>塗抹</option>
          <option ${p.method==='厚敷'?'selected':''}>厚敷</option>
          <option ${p.method==='噴霧'?'selected':''}>噴霧</option>
          <option ${p.method==='泡沫清潔'?'selected':''}>泡沫清潔</option>
        </select>
      </label>
      <label style="${p.method==='泡沫清潔'?'':'display:none'}">
        <div class="cfg-label">泡沫方式</div>
        <select onchange="setCfg('${id}','foam',this.value)">
          <option ${p.foam==='手起泡'?'selected':''}>手起泡</option>
          <option ${p.foam==='打泡器'?'selected':''}>打泡器</option>
        </select>
      </label>
    </div>
  </div>`;
}

function renderProducts(){const wrap=document.getElementById('productArea');wrap.innerHTML=catOrder.map(cat=>{const list=products.filter(p=>p.cat===cat);return `<div class="category"><h3 class="category-title">${cat}</h3><div class="products">${list.map(p=>{const c=state.cfg[p.id];const needsTime=c.selected&&!c.am&&!c.pm;return `<div class="product-card ${c.selected?'selected':''} ${needsTime?'needs-time':''}"><button type="button" class="product-main" onclick="toggleProduct('${p.id}')"><span class="check-dot">${c.selected?'✓':''}</span>${imgTag(p,'product-img')}<div class="product-name">${escapeHTML(p.name)}</div></button>${c.selected?productConfigHTML(p.id,c):''}</div>`}).join('')}</div></div>`}).join('')}
function selectedIds(){return products.filter(p=>state.cfg[p.id].selected).map(p=>p.id)}

function toggleProduct(id) {
    const p = state.cfg[id];
    p.selected = !p.selected;
    if (p.selected) {
        if (!p.am && !p.pm && p.defaultTimes) {
            if (p.defaultTimes.includes('am')) p.am = true;
            if (p.defaultTimes.includes('pm')) p.pm = true;
        }
        if (p.am && !state.order.am.includes(id)) state.order.am.push(id);
        if (p.pm && !state.order.pm.includes(id)) state.order.pm.push(id);
    } else {
        state.order.am = state.order.am.filter(x => x !== id);
        state.order.pm = state.order.pm.filter(x => x !== id);
        p.am = false;
        p.pm = false;
    }
    renderAll();
}

function renderAll(){renderProducts();renderOrders();renderPoster()}
function setTime(id,kind,val){const p=state.cfg[id];p[kind]=val;if(val&&!state.order[kind].includes(id))state.order[kind].push(id);if(!val)state.order[kind]=state.order[kind].filter(x=>x!==id);renderAll();}
function setCfg(id,key,val){const p=state.cfg[id];p[key]=val;if(key==='amountType'){if(val==='cm'&&!['1','2'].includes(String(p.amountQty)))p.amountQty='1';if(val==='滴'&&!['1','2','3','4','5'].includes(String(p.amountQty)))p.amountQty='1';if(val==='適量'||val==='少量')p.amountQty=''}renderProducts();renderPoster()}
function validOrder(kind){return state.order[kind].filter(id=>state.cfg[id]?.selected && state.cfg[id]?.[kind])}
function renderOrders(){renderOrder('am');renderOrder('pm')}
function renderOrder(kind){const ids=validOrder(kind);const box=document.getElementById(kind==='am'?'amOrderBox':'pmOrderBox');if(!ids.length){box.innerHTML='<div class="empty" style="padding:10px;color:var(--muted);font-size:14px;width:100%">尚未加入商品</div>';return}box.innerHTML=ids.map((id,i)=>{const p=state.cfg[id];return `<div class="order-row"><div class="order-num">${i+1}</div>${imgTag(p,'order-img')}<div class="order-name">${escapeHTML(p.name)}</div><div class="move-btns"><button onclick="move('${kind}','${id}',-1)">←</button><button onclick="move('${kind}','${id}',1)">→</button></div></div>`}).join('')}
function move(kind,id,dir){const arr=validOrder(kind);const i=arr.indexOf(id);const j=i+dir;if(j<0||j>=arr.length)return;[arr[i],arr[j]]=[arr[j],arr[i]];state.order[kind]=arr;renderOrders();renderPoster()}
function getSkinText(){const vals=[...document.querySelectorAll('#skinTags input:checked')].map(x=>x.value);return vals.length?vals.join('、'):''}
function amount(p){if(p.amountType==='滴'||p.amountType==='cm')return `${p.amountQty||1} ${p.amountType}`;return p.amountType||'適量'}
function method(p){return p.method==='泡沫清潔'?`泡沫清潔 (${p.foam||'手起泡'})`:p.method}
function notePills(){const raw=document.getElementById('notes').value.trim();if(!raw)return '';return raw.split(/[、，,\n]/).map(s=>s.trim()).filter(Boolean).slice(0,6).map(s=>`<span class="note-pill">${escapeHTML(s)}</span>`).join('')}
function cards(kind){const ids=validOrder(kind);const compact=ids.length>8?' compact':'';if(!ids.length)return `<div class="empty" style="grid-column:1/-1;text-align:center;padding:50px;color:var(--muted);font-weight:700;">此時段暫無配置商品</div>`;return `<div class="cards${compact}">`+ids.map((id,i)=>{const p=state.cfg[id];return `<div class="poster-card"><div class="num">${i+1}</div>${imgTag(p,'card-img')}<div class="card-name">${escapeHTML(p.name)}</div><div class="chip">用量 ${escapeHTML(amount(p))}</div><div class="chip">用法 ${escapeHTML(method(p))}</div></div>`}).join('')+'</div>'}
function renderPoster(){const customer=document.getElementById('customer')?.value.trim()||'';const skin=getSkinText();const date=document.getElementById('date')?.value||'';const provider=document.getElementById('provider')?.value.trim()||'';document.getElementById('poster').innerHTML=`<div class="poster-bg"></div><header class="poster-top"><div class="poster-head"><div class="brand">RENE · CELL<br>PRESCRIPTION</div><div class="poster-title">專屬保養<br>配置建議</div></div><div class="poster-meta"><div class="info-card"><div class="info-grid"><div class="info-row"><b>客戶</b><span>${escapeHTML(customer)}</span></div><div class="info-row"><b>配置日期</b><span>${escapeHTML(date)}</span></div><div class="info-row"><b>配置者</b><span>${escapeHTML(provider)}</span></div><div class="info-row wide"><b>膚況重點</b><span>${escapeHTML(skin)}</span></div></div></div><div class="meta-bottom"><div class="side-note"><div class="note-title">注意事項</div><div class="note-tags">${notePills()}</div></div></div></div></header><main class="poster-main"><section class="section am"><div class="section-head"><span>☀ 白天 AM 使用順序</span><span class="hint">由左至右依序使用</span></div>${cards('am')}</section><section class="section pm"><div class="section-head"><span>☾ 晚上 PM 使用順序</span><span class="hint">由左至右依序使用</span></div>${cards('pm')}</section></main>`}

function validateBeforeOutput(){
  const ids=selectedIds();
  if(!ids.length){alert('請先選擇商品。');return false}
  const noTime=ids.filter(id=>!state.cfg[id].am&&!state.cfg[id].pm);
  if(noTime.length){alert('有商品尚未選擇白天 AM 或晚上 PM，請先完成設定。');renderProducts();return false}
  renderPoster();
  return true;
}

function generatePoster(){
  if(!validateBeforeOutput())return;
  const target=document.getElementById('previewSection')||document.querySelector('.preview-panel');
  target?.scrollIntoView({behavior:'smooth'});
}

function waitImages(el){const imgs=[...el.querySelectorAll('img')].filter(img=>img.style.display!=='none');return Promise.all(imgs.map(img=>img.complete?Promise.resolve():new Promise(res=>{img.onload=img.onerror=res}))) }
function fileBaseName(){
  const customer=(document.getElementById('customer')?.value||'客戶').trim().replace(/[\/:*?"<>|\s]+/g,'')||'客戶';
  const date=(document.getElementById('date')?.value||'').trim();
  return `RENECELL_${customer}${date?'_'+date:''}`;
}

/* 結合版輸出設定
   - 基底畫布：800 × 1200（2:3）
   - 下載圖片：scale 3 = 2400 × 3600
   - 分享 LINE：scale 2 = 1600 × 2400，使用 JPG 0.92 提高手機分享成功率
*/
async function makeCanvas(scale=2){
  if(!validateBeforeOutput())return null;
  const src=document.getElementById('poster');
  const clone=src.cloneNode(true);
  clone.id='posterExport';
  clone.classList.add('export-mode');
  const holder=document.createElement('div');
  holder.className='hidden-export';
  holder.appendChild(clone);
  document.body.appendChild(holder);

  await document.fonts.ready;
  await waitImages(clone);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

  const canvas=await html2canvas(clone,{
    backgroundColor:'#f5f1eb',
    scale:scale,
    useCORS:true,
    allowTaint:false,
    width:800,
    windowWidth:800,
    scrollX:0,
    scrollY:0
  });

  holder.remove();
  return canvas;
}

function triggerDownload(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download=filename;
  a.href=url;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

async function handleAction(type){
  const btn=document.getElementById(type==='download'?'downloadBtn':'shareBtn');
  const original=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='處理中…'}

  try{
    if(type==='download'){
      const canvas=await makeCanvas(3);
      if(!canvas)return;
      const blob=await new Promise(res=>canvas.toBlob(res,'image/png',1));
      triggerDownload(blob,fileBaseName()+'-高清.png');
      return;
    }

    const canvas=await makeCanvas(2);
    if(!canvas)return;
    const blob=await new Promise(res=>canvas.toBlob(res,'image/jpeg',0.92));
    const filename=fileBaseName()+'-LINE.jpg';
    const file=new File([blob],filename,{type:'image/jpeg'});

    if(navigator.canShare&&navigator.canShare({files:[file]})){
      try{
        await navigator.share({files:[file],title:'RENE CELL 保養配置圖'});
        return;
      }catch(shareErr){
        if(shareErr&&shareErr.name==='AbortError')return;
      }
    }

    triggerDownload(blob,filename);
    alert('此裝置無法直接分享到 LINE，已改為下載圖片。請從 LINE 聊天室傳送圖片；若要最清楚，可用「檔案」方式傳送。');
  }catch(e){
    console.error(e);
    alert('圖片產生失敗，請確認網路環境或重新整理後再試。');
  }finally{
    if(btn){btn.disabled=false;btn.textContent=original}
  }
}

// 保留舊函式名稱，避免舊按鈕或快取版本失效
function downloadPNG(){return handleAction('download')}
function downloadImage(){return downloadPNG()}
function shareLine(){return handleAction('share')}

</script>
