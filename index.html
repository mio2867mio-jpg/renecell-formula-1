<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RENE CELL 保養配置圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;700;900&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
:root{
  --brown:#4f3b31; --brown2:#6d574a; --ink:#2f2926; --muted:#8a7b70;
  --cream:#f7f2ea; --paper:#fffdfa; --gold:#c7a866; --line:#eadfcc;
  --am:#d9eef3; --amHead:#bcdce4; --pm:#5a463d; --pmBody:#eee9e2;
  --shadow:0 18px 55px rgba(65,45,31,.15); --radius:26px;
}
*{box-sizing:border-box}
html,body{max-width:100%;overflow-x:hidden}
body{margin:0;font-family:'Noto Sans TC',system-ui,sans-serif;background:linear-gradient(135deg,#eee6da,#fffaf2);color:var(--ink)}
button,input,select,textarea{font-family:inherit}
button{cursor:pointer;border:0;outline:none}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{width:min(460px,100%);background:rgba(255,255,255,.84);border:1px solid rgba(255,255,255,.85);border-radius:34px;box-shadow:var(--shadow);padding:34px;text-align:center;backdrop-filter:blur(8px)}
.login-title{font-family:'Cormorant Garamond',serif;letter-spacing:.22em;color:var(--brown2);font-size:20px;margin-bottom:8px}.login h1{font-family:'Noto Serif TC',serif;font-size:31px;margin:0 0 14px;color:var(--brown)}
.login input{width:100%;height:52px;border-radius:18px;border:1px solid var(--line);padding:0 16px;font-size:18px;text-align:center;background:white;margin:12px 0}.login button{width:100%;height:52px;border-radius:18px;background:var(--brown);color:white;font-weight:900;font-size:18px}.login-note{color:var(--muted);font-size:13px;line-height:1.7;margin-top:16px}.error{display:none;color:#b34949;font-weight:700;margin-top:8px}
.app{display:none;max-width:1500px;margin:0 auto;padding:20px 18px 60px}
.topbar{position:sticky;top:0;z-index:20;background:rgba(247,242,234,.86);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.9);box-shadow:0 8px 26px rgba(65,45,31,.08);border-radius:0 0 28px 28px;padding:12px;margin-bottom:18px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center}
.action{height:48px;padding:0 22px;border-radius:999px;font-weight:900;font-size:16px;background:white;color:var(--brown);box-shadow:0 5px 15px rgba(65,45,31,.08);transition:all 0.2s}.action:disabled{opacity:0.6;cursor:not-allowed}.action:active{transform:scale(0.96)}.action.primary{background:var(--brown);color:white}.action.blue{background:#e0f2f6;color:#254f5a}.action.line{background:#06c755;color:white}
.notice{background:#fff8e8;border:1px solid #ead6a6;color:#6a5639;border-radius:20px;padding:12px 16px;line-height:1.6;margin-bottom:16px;font-weight:900;text-align:center}
.notice-title{font-weight:900;color:#5a463d;margin-bottom:8px;font-size:15px;display:flex;align-items:center;gap:6px}
.notice-list{margin:0;padding-left:22px}
.notice-list li{margin-bottom:6px}
.notice-list b{color:#8b6d42;font-weight:800}
.layout{display:grid;grid-template-columns:minmax(360px,470px) 1fr;gap:18px;align-items:start}
.panel{background:rgba(255,255,255,.78);border:1px solid rgba(255,255,255,.92);border-radius:28px;box-shadow:var(--shadow);padding:22px;scroll-margin-top: 80px;}
.panel h2{font-family:'Noto Serif TC',serif;margin:0 0 16px;color:var(--brown);font-size:24px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:block}.label{font-size:13px;color:var(--muted);font-weight:900;margin:0 0 7px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:16px;background:white;padding:12px 14px;font-size:16px;outline:none;transition:border-color 0.2s}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--gold)}.field textarea{height:86px;resize:vertical}
.wide{grid-column:1/-1}.tags{display:flex;flex-wrap:wrap;gap:8px}.tag{display:inline-flex;align-items:center;gap:6px;background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:800;color:var(--brown);cursor:pointer;transition:all 0.2s}.tag input:checked + span{color:var(--brown)}
.category{margin:18px 0}
.category-title{font-family:'Noto Serif TC',serif;font-size:20px;color:var(--brown);margin:0 0 10px;display:flex;align-items:center;gap:8px}
.category-title:before{content:'';width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 5px rgba(199,168,102,.18)}
.products{display:grid;grid-template-columns:1fr;gap:10px}
.product-card{position:relative;background:white;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 5px 16px rgba(65,45,31,.05);display:flex;flex-direction:column;gap:10px;transition:all 0.2s}
.product-card.selected{border-color:#b8924f;box-shadow:0 0 0 3px rgba(199,168,102,.22);background:#fffaf2}
.product-card.needs-time{border-color:#e45b4b;box-shadow:0 0 0 3px rgba(228,91,75,.3);background:#fff5f2}
.time-warning{background:#fcebe8;color:#c0392b;border:1px solid #f5c6cb;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:900;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.product-main{display:grid;grid-template-columns:58px 1fr 34px;align-items:center;gap:12px;cursor:pointer;border:none;background:transparent;padding:0;width:100%;text-align:left}
.product-main .check-dot{position:static;grid-column:3;width:30px;height:30px;border-radius:50%;border:1px solid #d6bc86;background:#fbf7ef;color:#8b6e36;display:flex;align-items:center;justify-content:center;font-weight:900;transition:all 0.2s}
.product-card.selected .check-dot{background:var(--gold);color:white;border-color:var(--gold)}
.product-img{width:58px;height:58px;object-fit:cover;border-radius:14px;background:#f1f1ef}
.img-fallback{display:flex;align-items:center;justify-content:center;background:#efe4d3;color:#8b6e36;font-weight:900;font-size:1.1em;border-radius:14px}
.product-name{font-weight:900;line-height:1.25;font-size:17px;color:#1f1a17;text-align:left}

/* 順序微調改為由左至右橫向排列 */
.order-box{display:flex;flex-direction:row;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.order-row{display:flex;align-items:center;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 10px 6px 6px;gap:8px;box-shadow:0 2px 8px rgba(65,45,31,.04);max-width:100%}
.order-num{width:24px;height:24px;background:#f1e7d1;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#80653f;font-weight:900;font-size:12px;flex-shrink:0}
.order-img{width:32px;height:32px;object-fit:cover;border-radius:50%;flex-shrink:0}
.order-name{font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.move-btns{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.move-btns button{width:26px;height:26px;border-radius:50%;background:#f4eee4;color:var(--brown);font-weight:900;display:flex;align-items:center;justify-content:center;transition:background 0.2s}
.move-btns button:hover{background:#eaddc8}

.inline-config{margin-top:4px;padding:12px;border-top:1px dashed #e4d7c5;background:#fffaf4;border-radius:14px}
.inline-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px}
.cfg-label{font-size:13px;color:#7d6a5d;font-weight:900;margin-bottom:6px}
.mini-remove{border-radius:999px;padding:5px 12px;background:#f3ebe2;color:var(--brown);font-weight:900;font-size:13px;transition:background 0.2s}
.mini-remove:hover{background:#eadfcc}
.cfg-wide {margin-bottom:12px}
.cfg-wide .seg {display:flex;gap:8px}
.cfg-wide .seg button {flex:1;height:40px;border-radius:12px;background:white;border:1px solid var(--line);font-weight:900;color:var(--muted);transition:all 0.2s}
/* 白天/晚上點選狀態更明顯 */
.cfg-wide .seg button.active {background:var(--brown);color:white;border-color:var(--brown);box-shadow:0 4px 12px rgba(79,59,49,0.3);transform:translateY(-1px)}
.cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cfg-grid label{display:block}
.cfg-grid select{width:100%;height:40px;border-radius:12px;border:1px solid var(--line);background:white;padding:0 10px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}

.preview-panel{overflow:auto}.poster-shell{min-height:300px;display:flex;justify-content:center;align-items:flex-start;padding:10px}

/* 基底比例設定為 2:3，尺寸為 800x1200 */
.poster{width:800px;height:1200px;background:var(--paper);border-radius:34px;box-shadow:var(--shadow);position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;padding:18px 28px 24px;background-color:#f5f1eb}
.poster>*:not(.poster-bg){position:relative;z-index:1}
.poster-bg{position:absolute;inset:0;background:radial-gradient(circle at 20% 8%,rgba(255,255,255,.92),transparent 32%),linear-gradient(180deg,rgba(255,255,255,.88),rgba(247,243,236,.94));opacity:.96;z-index:0}
.poster-top{display:flex;flex-direction:column;gap:7px}
.poster-head{background:linear-gradient(180deg,rgba(255,255,255,.84),rgba(248,245,240,.78));border:1px solid rgba(255,255,255,.72);border-radius:18px;padding:9px 18px;display:flex;justify-content:center;align-items:center;box-shadow:0 5px 12px rgba(65,45,31,.055);backdrop-filter:blur(3px)}
.brand{display:none}
.poster-title{font-family:'Noto Serif TC',serif;text-align:center;font-weight:900;color:#2e2521;font-size:30px;line-height:1;letter-spacing:.06em;white-space:nowrap}
.poster-meta{display:flex;flex-direction:column;gap:6px;min-width:0}
.info-card{width:100%;background:rgba(255,255,255,.9);border-radius:16px;padding:9px 14px;box-shadow:0 4px 12px rgba(65,45,31,.055);backdrop-filter:blur(2px)}
.info-grid{display:grid;grid-template-columns:.9fr 1fr .9fr 1.8fr;gap:6px 14px;align-items:start}
.info-row b{display:block;color:#8a7b70;font-size:10px;margin-bottom:2px}
.info-row span{font-weight:900;font-size:14px;line-height:1.16;white-space:pre-wrap;word-break:break-word}
.info-row.wide{grid-column:auto}
.meta-bottom{display:grid;grid-template-columns:1fr;gap:6px;align-items:stretch}
.side-note{width:100%;background:rgba(255,255,255,.88);border-radius:16px;padding:9px 14px;box-shadow:0 4px 12px rgba(65,45,31,.055);backdrop-filter:blur(2px)}
.note-title{font-family:'Noto Serif TC',serif;font-weight:900;color:#4c3b33;margin-bottom:4px;font-size:14px}
.note-tags{display:flex;gap:8px;flex-wrap:wrap}
.note-pill{background:#fff;border-radius:999px;padding:4px 8px;color:#8b6d42;font-weight:800;font-size:10px;border:1px solid rgba(199,168,102,.18)}
.poster-main{display:flex;flex-direction:column;gap:12px;min-width:0;flex:1}
.section{border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.65);box-shadow:0 6px 18px rgba(65,45,31,.07);display:flex;flex-direction:column;backdrop-filter:blur(2px)}
.section.am{background:rgba(229,243,246,.88)}.section.pm{background:rgba(236,230,223,.9)}
.section-head{height:34px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-family:'Noto Serif TC',serif;font-weight:900;font-size:18px}
.am .section-head{background:rgba(203,232,239,.92);color:#284e58}.pm .section-head{background:rgba(89,66,56,.94);color:white}
.hint{font-family:'Noto Sans TC';font-size:10px;border-radius:999px;padding:4px 9px;background:rgba(255,255,255,.75);font-weight:900;color:inherit}
.cards{padding:18px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px 22px;align-content:start;min-height:0;flex:1;overflow:visible}
.poster-card{background:rgba(255,255,255,.96);border-radius:24px;min-height:224px;padding:13px 12px 12px;position:relative;display:flex;flex-direction:column;align-items:center;gap:7px;box-shadow:0 8px 18px rgba(70,50,38,.10);overflow:visible}
.poster-card:not(:nth-child(3n))::after{content:'>';position:absolute;right:-18px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid rgba(199,168,102,.45);color:#a67a2c;font-weight:900;font-size:12px;line-height:14px;text-align:center;box-shadow:0 3px 8px rgba(70,50,38,.08);z-index:3}
.num{position:absolute;left:12px;top:12px;width:34px;height:34px;border:2px solid #d7b873;color:#a67a2c;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;box-shadow:0 4px 10px rgba(166,122,44,.12)}
.card-img{width:142px;height:142px;border-radius:26px;object-fit:cover;background:#eee}
.card-name{font-weight:900;text-align:center;font-size:18px;line-height:1.2;min-height:38px;display:flex;align-items:center}
.chip-row{display:flex;align-items:center;justify-content:center;gap:5px;width:100%;min-width:0;flex-wrap:wrap}
.chip{border-radius:999px;padding:6px 9px;font-weight:900;font-size:12px;line-height:1.05;text-align:center;max-width:100%;white-space:nowrap}
.chip.amount{background:#f2e7d1;color:#80653f}
.chip.method{background:#5a463d;color:white}
.chip.freq{background:#e5d9c3;color:#6b4f2e}
.cards.compact{grid-template-columns:repeat(4,1fr);gap:8px 14px;padding:10px}
.cards.compact .poster-card{min-height:136px;border-radius:15px;padding:6px 7px 5px;gap:2px}
.cards.compact .poster-card::after{content:none}
.cards.compact .poster-card:not(:nth-child(4n))::after{content:'>';position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:50%;background:rgba(255,255,255,.92);border:1px solid rgba(199,168,102,.42);color:#a67a2c;font-weight:900;font-size:9px;line-height:10px;text-align:center;box-shadow:0 2px 6px rgba(70,50,38,.07);z-index:3}
.cards.compact .num{left:6px;top:6px;width:20px;height:20px;font-size:10px;border-width:1px}
.cards.compact .card-img{width:88px;height:88px;border-radius:16px}
.cards.compact .card-name{font-size:11.2px;line-height:1.05;min-height:21px}
.cards.compact .chip-row{gap:3px}
.cards.compact .chip{font-size:7.3px;padding:2px 5px}

.hidden-export{position:fixed;left:-3000px;top:0;z-index:-1;width:800px;overflow:visible;}
.export-mode{
  transform:none!important;
  position:relative!important;
  left:auto!important;
  margin:0!important;
  border-radius:0!important;
  box-shadow:none!important;
  width:800px!important;
  min-height:1200px!important;
  height:1200px!important;
  background-color:#f5f1eb!important;
}
.export-mode .poster-bg{border-radius:0!important}

@media(max-width:1100px){.layout{grid-template-columns:1fr}.products{grid-template-columns:repeat(2,1fr)}.poster{transform:scale(.85);transform-origin:top center;margin-bottom:-140px}.meta-bottom{grid-template-columns:1fr}}@media(max-width:720px){.app{width:100%;max-width:100%;padding:12px 10px 50px;overflow:hidden}.topbar{border-radius:0 0 20px 20px}.action{height:44px;font-size:14px;padding:0 14px}.panel{width:100%;padding:16px;border-radius:22px}.form-grid{grid-template-columns:1fr}.products{grid-template-columns:1fr;gap:10px}.product-card{min-height:148px}.poster-shell{position:relative;width:100%;max-width:100%;height:min(135vw,560px);min-height:500px;padding:0;display:block;overflow:hidden}.poster{position:absolute;top:0;left:50%;transform:translateX(-50%) scale(.42);transform-origin:top center;margin:0}.preview-panel{padding:14px;overflow:hidden}.cfg-grid{grid-template-columns:1fr}}

.topbar-generate{justify-content:center}
.bottom-actions-panel{text-align:center;max-width:680px;margin-left:auto!important;margin-right:auto!important}
.bottom-actions-panel h2{margin-bottom:18px}
.bottom-actions{display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap;max-width:560px;margin:0 auto}
.bottom-actions .action{min-width:220px;height:58px;font-size:18px}
@media(max-width:720px){
  .bottom-actions-panel{width:min(100%,390px);padding:22px 18px}
  .bottom-actions{display:grid;grid-template-columns:1fr;gap:12px;width:100%;max-width:320px}
  .bottom-actions .action{width:100%;min-width:0;height:52px;font-size:17px}
}

</style>
</head>
<body>
<div id="login" class="login"><div class="login-card"><div class="login-title">RENE CELL</div><h1>保養配置工具</h1><input id="password" type="password" placeholder="請輸入團隊密碼" onkeydown="if(event.key==='Enter') unlock()"><button onclick="unlock()">進入系統</button><div id="pwError" class="error">密碼錯誤，請重新輸入</div><div class="login-note">此工具限團隊內部教育與配置使用，請勿任意外流。</div></div></div>
<div id="app" class="app">
  <div class="topbar topbar-generate">
    <button id="generateBtnTop" class="action primary" onclick="generatePoster()">生成配置圖</button>
  </div>
  <div class="notice">請使用外部瀏覽器開啟</div>
  <div class="layout">
    <div class="left-col">
      <section class="panel"><h2>顧客資料</h2><div class="form-grid">
        <label class="field"><div class="label">顧客姓名（可空白）</div><input id="customer" placeholder=""></label>
        <label class="field"><div class="label">配置日期</div><input id="date" type="date"></label>
        <div class="wide"><div class="label">膚況重點</div><div id="skinTags" class="tags"></div></div>
        <label class="field wide"><div class="label">注意事項</div><textarea id="notes" placeholder="例如：加強保濕、加強防曬、2週回訪"></textarea></label>
        <label class="field wide"><div class="label">配置者（可空白）</div><input id="provider" placeholder=""></label>
      </div></section>
      <section class="panel" style="margin-top:18px"><h2>順序微調</h2><div class="label">白天 AM</div><div id="amOrderBox" class="order-box"></div><div class="label" style="margin-top:14px">晚上 PM</div><div id="pmOrderBox" class="order-box"></div></section>
    </div>
    <div class="right-col">
      <section class="panel"><h2>選擇商品</h2><div id="productArea"></div></section>
      <section id="previewSection" class="panel preview-panel" style="margin-top:18px"><h2>配置圖預覽</h2><div class="poster-shell"><div id="poster" class="poster"></div></div></section>
    </div>
  </div>
  <section class="panel bottom-actions-panel" style="margin-top:18px">
    <h2>輸出圖片</h2>
    <div class="bottom-actions">
      <button class="action blue" id="downloadBtn" onclick="handleAction('download')">下載圖片</button>
      <button class="action line" id="shareBtn" onclick="handleAction('share')">分享到 LINE</button>
    </div>
    <p style="font-size:13px;color:var(--muted);margin:16px auto 0;line-height:1.7;max-width:480px">📌 LINE 傳送「相片」會自動壓縮畫質。建議先「下載圖片」儲存後，於 LINE 聊天室點選「＋」→「檔案」上傳，即可保留最清晰的原始畫質。</p>
  </section></div>
<script>
/* 【請在此處修改您的團隊登入密碼】 */
const PASSWORD='K24519811'; 

const catOrder=['清潔','化妝水 / 精華','面霜 / 防護','面膜 / 特殊護理'];
const skinOptions=['敏感','乾燥','出油','粉刺','痘痘','暗沉','斑點','毛孔','術後修護','泛紅'];
const products=[
{id:'cleanser',cat:'清潔',name:'酵素潔顏粉',img:'cleanser.png',defaultTimes:['am','pm'],amountType:'適量',amountQty:'',method:'泡沫清潔',foam:'手起泡',freq:'每日'},
{id:'exfoliate',cat:'清潔',name:'去角質面霜',img:'exfoliate.png',defaultTimes:['pm'],amountType:'適量',amountQty:'',method:'塗抹',foam:'手起泡',freq:'每週2次'},
{id:'toner',cat:'化妝水 / 精華',name:'多肽化妝水',img:'toner.png',defaultTimes:['am','pm'],amountType:'滴',amountQty:'3',method:'塗抹',foam:'手起泡',freq:'每日'},
{id:'hiq_pre',cat:'化妝水 / 精華',name:'Hi-Q前導精華',img:'hiq_pre.png',defaultTimes:['am','pm'],amountType:'cm',amountQty:'1',method:'塗抹',foam:'手起泡',freq:'每日'},

    const p = state.cfg[id];
    p.selected = !p.selected;
    if (p.selected) {
        if (!p.am && !p.pm && p.defaultTimes) {
            if (p.defaultTimes.includes('am')) p.am = true;
            if (p.defaultTimes.includes('pm')) p.pm = true;
        }
        if (p.am && !state.order.am.includes(id)) state.order.am.push(id);
        if (p.pm && !state.order.pm.includes(id)) state.order.pm.push(id);
    } else {
        state.order.am = state.order.am.filter(x => x !== id);
        state.order.pm = state.order.pm.filter(x => x !== id);
        p.am = false;
        p.pm = false;

function validateBeforeOutput(){
  const ids=selectedIds();
  if(!ids.length){alert('請先選擇商品。');return false}
  const noTime=ids.filter(id=>!state.cfg[id].am&&!state.cfg[id].pm);
  if(noTime.length){alert('有商品尚未選擇白天 AM 或晚上 PM，請先完成設定。');renderProducts();return false}
  renderPoster();
  return true;
}

let shareCache=null; // {blob, filename} 分享用圖片快取
let shareCacheBusy=false;

function generatePoster(){
  if(!validateBeforeOutput())return;
  shareCache=null; // 內容已更新，先前快取的分享圖片失效
  const target=document.getElementById('previewSection')||document.querySelector('.preview-panel');
  target?.scrollIntoView({behavior:'smooth'});
  // 背景預先產生分享用圖片，讓使用者按下「分享到 LINE」時可立即叫出系統分享面板，
  // 避免因即時運算耗時過長，被 iOS Safari 視為使用者手勢已過期而直接擋下分享。
  setTimeout(prewarmShareAsset,300);
}

async function prewarmShareAsset(){
  if(shareCacheBusy||shareCache)return;
  shareCacheBusy=true;
  try{
    const ios=isIOS();
    const canvas=await makeCanvas(3); // 分享用途統一用較小倍數：檔案小、渲染快、LINE 傳送較不易逾時失敗
    if(!canvas)return;
    const blob=await new Promise(res=>canvas.toBlob(res,ios?'image/jpeg':'image/png',ios?0.9:0.92));
    const filename=fileBaseName()+(ios?'-LINE高畫質.jpg':'-LINE高清.png');
    shareCache={blob,filename};
  }catch(e){
    console.warn('分享圖片預先產生失敗，將於按下分享時即時產生',e);
  }finally{
    shareCacheBusy=false;
  }
}

function waitImages(el){const imgs=[...el.querySelectorAll('img')].filter(img=>img.style.display!=='none');return Promise.all(imgs.map(img=>img.complete?Promise.resolve():new Promise(res=>{img.onload=img.onerror=res}))) }

/* iOS 偵測（含 iPadOS，因其會偽裝成 MacIntel）
   原本只靠 UA + platform/maxTouchPoints 判斷，在部分 iPad（例如特定 Safari 版本下
   maxTouchPoints 讀取異常）會誤判為「非 iOS」，導致走到未限制畫布尺寸的桌面版流程，
   產生過大畫布、渲染超久、甚至分享失敗。這裡加上多重備援判斷，任一條件成立即視為 iOS。*/
function isIOS(){
  const ua = navigator.userAgent || navigator.vendor || '';
  if(/iP(hone|od|ad)/.test(ua)) return true;
  if(navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1) return true;
  // 備援判斷：具備觸控能力 + Mac 平台字串（iPadOS 偽裝桌面版時常見組合）
  if(('ontouchend' in document || navigator.maxTouchPoints > 0) && /Mac/.test(navigator.platform||'')) return true;
  // 備援判斷：webkit 專屬 CSS 特徵，Android/桌面瀏覽器不支援
  try{ if(window.CSS && CSS.supports && CSS.supports('-webkit-touch-callout','none') && /Safari/.test(ua) && !/Chrome|CriOS|Android/.test(ua)) return true; }catch(e){}
  return false;
}

/* iOS Safari 對單一 canvas 的面積有硬性限制（約 16,777,216 像素，即 4096x4096）
   超過此限制時 html2canvas 會產生空白或損毀的圖片，甚至造成分頁當機或渲染極慢。
   為避免 isIOS() 萬一仍判斷失準，這裡「不論裝置」一律套用面積上限保護，
   只是非 iOS 裝置給予較寬鬆的上限，確保任何情況都不會產生過大畫布。*/
function getSafeScale(baseW, baseH, desiredScale){
  const limit = isIOS() ? 16000000 : 36000000; // 非 iOS 也設保護上限，避免誤判時仍產生超大圖
  const area = baseW*desiredScale*baseH*desiredScale;
  if(area <= limit) return desiredScale;
  const maxScale = Math.floor((Math.sqrt(limit/(baseW*baseH)))*10)/10;
  return Math.max(2, maxScale);
}
function fileBaseName(){
  const customer=(document.getElementById('customer')?.value||'客戶').trim().replace(/[\/:*?"<>|\s]+/g,'')||'客戶';
  const date=(document.getElementById('date')?.value||'').trim();
  return `RENECELL_${customer}${date?'_'+date:''}`;
}

/* 結合版輸出設定
   - 基底畫布寬度：800px，高度依內容自動延伸
   - 下載圖片：scale 4 PNG，高解析輸出
   - 分享 LINE：scale 4 PNG，優先保留最高畫質
*/
async function renderCanvasAt(scale){
  const src=document.getElementById('poster');
  const clone=src.cloneNode(true);
  clone.id='posterExport';
  clone.classList.add('export-mode');
  const holder=document.createElement('div');
  holder.className='hidden-export';
  holder.appendChild(clone);
  document.body.appendChild(holder);

  await document.fonts.ready;
  await waitImages(clone);
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));

  const canvas=await html2canvas(clone,{
    backgroundColor:'#f5f1eb',
    scale:scale,
    useCORS:true,
    allowTaint:false,
    width:800,
    height:1200,
    windowWidth:800,
    windowHeight:1200,
    scrollX:0,
    scrollY:0
  });

  holder.remove();
  return canvas;
}

async function makeCanvas(scale=2){
  if(!validateBeforeOutput())return null;
  const safeScale=getSafeScale(800,1200,scale);
  const tryScales=[safeScale];
  // 若安全倍數仍失敗，逐步降階重試，確保低階裝置也能成功產生圖片
  [3,2].forEach(s=>{ if(s<safeScale && !tryScales.includes(s)) tryScales.push(s) });

  let lastErr=null;
  for(const s of tryScales){
    try{
      const canvas=await renderCanvasAt(s);
      if(canvas && canvas.width>0 && canvas.height>0) return canvas;
    }catch(e){
      lastErr=e;
      console.warn('畫布產生失敗，倍數 '+s+'，嘗試降階重試', e);
    }
  }
  if(lastErr) throw lastErr;
  return null;
}

function triggerDownload(blob, filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download=filename;
  a.href=url;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>resolve(reader.result);
    reader.onerror=reject;
    reader.readAsDataURL(blob);
  });
}

    : '請點「儲存圖片」。若沒有跳出面板，再長按下方圖片選擇「儲存圖片」。';
  panel.innerHTML=`<div style="max-width:880px;margin:0 auto 24px;text-align:center;">
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-bottom:12px;position:sticky;top:0;background:#f7f2ea;padding:8px 0;">
      <button type="button" id="iosShareImage" style="border:0;border-radius:999px;background:#4f3b31;color:white;font-weight:900;padding:11px 18px;">${mode==='share'?'分享至 LINE':'儲存圖片'}</button>
      <button type="button" id="iosCloseImage" style="border:0;border-radius:999px;background:white;color:#4f3b31;font-weight:900;padding:11px 18px;">關閉</button>
    </div>
    <div style="font-weight:900;font-size:18px;margin:8px 0 6px;">${title}</div>
    <div style="font-size:14px;line-height:1.7;color:#6d574a;margin-bottom:14px;">${tip}</div>
    <img src="${dataURL}" alt="${filename}" style="display:block;width:100%;height:auto;border-radius:18px;box-shadow:0 12px 34px rgba(65,45,31,.18);background:white;">
  </div>`;
  document.body.appendChild(panel);
  document.body.style.overflow='hidden';
  document.getElementById('iosCloseImage').onclick=()=>{
    if(mode==='save') alert('如果還沒儲存，請先點「儲存圖片」。');
    panel.remove();
    document.body.style.overflow='';
  };
  document.getElementById('iosShareImage').onclick=async()=>{
    if(!(await shareImageFile(blob,filename))){
      alert('此瀏覽器無法直接分享，請長按圖片儲存後再傳送。');
    }
  };
}

async function shareImageFile(blob, filename){
  const file=new File([blob],filename,{type:blob.type});
  if(!(navigator.canShare&&navigator.canShare({files:[file]}))) return false;
  try{
    await navigator.share({files:[file],title:'RENE CELL 保養配置圖'});
    return true;
  }catch(shareErr){
    return shareErr&&shareErr.name==='AbortError';
  }
}

const LINE_TIP='\n\n小提醒：LINE 傳送「相片」仍可能壓縮畫質。若要最清楚，請先存照片或檔案，再到 LINE 傳送。';

/* 全螢幕處理中提示：在按下按鈕的當下「立即」顯示，讓使用者清楚知道系統正在動作，
   不會誤以為卡住或沒反應。這也讓下載/分享兩種流程有一致、明確的過場，
   避免「跳轉太久搞不清楚狀態」的感覺。*/
function showBusyOverlay(text){
  hideBusyOverlay();
  if(!document.getElementById('busyOverlayStyle')){
    const st=document.createElement('style');
    st.id='busyOverlayStyle';
    st.textContent='@keyframes rcSpin{to{transform:rotate(360deg)}}';
    document.head.appendChild(st);
  }
  const ov=document.createElement('div');
  ov.id='busyOverlay';
  ov.style.cssText='position:fixed;inset:0;z-index:99998;background:rgba(247,242,234,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:inherit;color:#4f3b31;font-weight:900;font-size:16px;text-align:center;padding:24px;';
  ov.innerHTML='<div style="width:46px;height:46px;border:4px solid #eadfcc;border-top-color:#4f3b31;border-radius:50%;animation:rcSpin .8s linear infinite"></div><div>'+text+'</div>';
  document.body.appendChild(ov);
}
function hideBusyOverlay(){document.getElementById('busyOverlay')?.remove();}

async function handleAction(type){
  const btn=document.getElementById(type==='download'?'downloadBtn':'shareBtn');
  const original=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='處理中…'}
  showBusyOverlay(type==='download'?'圖片產生中，請稍候…':'準備分享圖片，請稍候…');

  const ios=isIOS();

  try{
    if(type==='download'){
      const canvas=await makeCanvas(ios?3:4);
      if(!canvas)return;
      const blob=await new Promise(res=>canvas.toBlob(res,ios?'image/jpeg':'image/png',ios?0.96:1));
      const filename=fileBaseName()+(ios?'-iPhone儲存.jpg':'-高清.png');

      hideBusyOverlay();
      if(ios){
        await showIOSImagePanel(blob,filename,'save');
        return;
      }

      triggerDownload(blob,filename);
      alert('圖片已下載完成，可至瀏覽器的下載紀錄或「檔案」App 確認。'+LINE_TIP);
      return;
    }

    // 分享：優先使用預先準備好的快取圖片，讓 navigator.share 能在使用者這次點擊的
    // 手勢有效期內立即觸發，避免因即時運算耗時過長被 iOS Safari 視為手勢已過期而擋下分享面板。
    let blob,filename;
    if(shareCache){
      ({blob,filename}=shareCache);
    }else{
      const canvas=await makeCanvas(3);
      if(!canvas)return;
      blob=await new Promise(res=>canvas.toBlob(res,ios?'image/jpeg':'image/png',ios?0.9:0.92));
      filename=fileBaseName()+(ios?'-LINE高畫質.jpg':'-LINE高清.png');
    }
    shareCache=null; // 用過即丟，避免下次分享用到過期的舊圖

    hideBusyOverlay();
    if(await shareImageFile(blob,filename))return;

    if(ios){
      await showIOSImagePanel(blob,filename,'share');
      return;
    }

    triggerDownload(blob,filename);
    alert('此裝置無法直接分享到 LINE，已改為下載高清圖片。'+LINE_TIP);
  }catch(e){
    console.error(e);
    alert('圖片產生失敗，請確認網路環境充足後再試一次。若您是從 LINE 內建的瀏覽器開啟這個頁面，請改用 Safari 開啟後再試（右下角「⋯」或分享圖示中選擇「用瀏覽器開啟」）。');
  }finally{
    hideBusyOverlay();
    if(btn){btn.disabled=false;btn.textContent=original}
  }
}

// 保留舊函式名稱，避免舊按鈕或快取版本失效
function downloadPNG(){return handleAction('download')}
function downloadImage(){return downloadPNG()}
function shareLine(){return handleAction('share')}

</script>
